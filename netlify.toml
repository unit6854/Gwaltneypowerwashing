[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Long-lived cache for hashed assets ──────────────────────────────────────
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers on ALL routes ──────────────────────────────────────────
# NOTE: previous config used "/*.html" which never matched Astro's
# output paths (/pricing/, /faq/ etc.) — fixed to "/*"
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Limit referrer data sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Force HTTPS for 1 year (preload-ready)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Restrict browser feature access
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Basic XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Prevent DNS prefetch leaking visited URLs
    X-DNS-Prefetch-Control = "off"

# ── Redirects ────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/admin"
  to     = "/admin/"
  status = 301

# Redirect www → non-www (canonical domain)
[[redirects]]
  from   = "https://www.gwaltneypressurewashing.com/*"
  to     = "https://gwaltneypressurewashing.com/:splat"
  status = 301
  force  = true
