backend:
  name: git-gateway
  branch: main

locale: en

# All uploads go here — images AND videos
media_folder: "public/uploads"
public_folder: "/uploads"

collections:

  # ── ⭐ OUR WORK / PORTFOLIO (main thing Brian will use) ──────────────────
  - name: "portfolio"
    label: "⭐ Our Work — Add Photos & Videos"
    files:
      - name: "items"
        label: "Manage Photos & Videos"
        file: "src/data/portfolio.json"
        format: json
        fields:
          - { label: "Page Heading",    name: "heading",    widget: "string" }
          - { label: "Page Sub-heading",name: "subheading", widget: "text"   }
          - label: "Photos & Videos"
            name: "items"
            widget: "list"
            label_singular: "Photo or Video"
            summary: "{{fields.title}} ({{fields.category}})"
            add_button_text: "➕ Add Photo or Video"
            fields:
              - label: "Job Title / Description"
                name: "title"
                widget: "string"
                hint: "e.g. Driveway Cleaning — Lebanon, TN"
              - label: "Upload Photo or Video"
                name: "src"
                widget: "file"
                hint: "Photos: JPG or WebP. Videos: MP4. Keep videos under 50MB."
                media_library:
                  max_file_size: 52428800
              - label: "Type"
                name: "type"
                widget: "select"
                default: "image"
                options:
                  - { label: "📷 Photo",  value: "image" }
                  - { label: "🎥 Video",  value: "video" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "Driveways"
                  - "House Washing"
                  - "Decks & Patios"
                  - "Commercial"
                  - "Concrete"
                  - "Fleet"
              - label: "Location (optional)"
                name: "caption"
                widget: "string"
                required: false
                hint: "e.g. Mt. Juliet, TN"

  # ── Site Content (text editing) ──────────────────────────────────────────
  - name: "pages"
    label: "Site Content (Text & Reviews)"
    files:

      - name: "homepage"
        label: "Homepage Text"
        file: "src/data/homepage.json"
        format: json
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge Text",       name: "badge",           widget: "string" }
              - { label: "Headline Line 1",  name: "headline",        widget: "string" }
              - { label: "Headline (Green)", name: "headline_accent", widget: "string" }
              - { label: "Headline Line 3",  name: "headline_end",    widget: "string" }
              - { label: "Sub-headline",     name: "subheadline",     widget: "text"   }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number",    name: "number",   widget: "number" }
              - { label: "Suffix",    name: "suffix",   widget: "string" }
              - { label: "Label",     name: "label",    widget: "string" }
              - { label: "Sub-label", name: "sublabel", widget: "string" }
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading",          name: "heading", widget: "string" }
              - { label: "Body Paragraph 1", name: "body",    widget: "text"   }
              - { label: "Body Paragraph 2", name: "body2",   widget: "text"   }
              - label: "Bullet Points"
                name: "points"
                widget: "list"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text",    name: "text",    widget: "text"   }

      - name: "testimonials"
        label: "Customer Reviews"
        file: "src/data/testimonials.json"
        format: json
        fields:
          - { label: "Heading",     name: "heading",    widget: "string" }
          - { label: "Sub-heading", name: "subheading", widget: "string" }
          - label: "Reviews"
            name: "items"
            widget: "list"
            fields:
              - { label: "Review Text", name: "quote",    widget: "text"   }
              - { label: "Customer Name", name: "name",   widget: "string" }
              - { label: "Location",    name: "location", widget: "string" }
              - { label: "Initials",    name: "initials", widget: "string", hint: "2 letters, e.g. SM" }
              - { label: "Star Rating", name: "rating",   widget: "number", value_type: "int", min: 1, max: 5, default: 5 }

      - name: "services"
        label: "Services"
        file: "src/data/services.json"
        format: json
        fields:
          - { label: "Heading",     name: "heading",     widget: "string" }
          - { label: "Description", name: "description", widget: "text"   }
          - label: "Service Cards"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title",         name: "title",       widget: "string"  }
              - { label: "Description",   name: "description", widget: "text"    }
              - { label: "Most Popular?", name: "featured",    widget: "boolean", default: false }

      - name: "pricing"
        label: "Pricing"
        file: "src/data/pricing.json"
        format: json
        fields:
          - { label: "Disclaimer", name: "disclaimer", widget: "text" }
          - label: "Residential"
            name: "residential"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Line Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Service", name: "service", widget: "string" }
                  - { label: "Price",   name: "price",   widget: "string" }
                  - { label: "Notes",   name: "notes",   widget: "string" }

      - name: "faq"
        label: "FAQ"
        file: "src/data/faq.json"
        format: json
        fields:
          - { label: "Heading",     name: "heading",    widget: "string" }
          - { label: "Sub-heading", name: "subheading", widget: "string" }
          - label: "Questions"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer",   name: "answer",   widget: "text"   }

      - name: "business"
        label: "Contact Info & Social Links"
        file: "src/data/business.json"
        format: json
        fields:
          - { label: "Phone (display)", name: "phone",       widget: "string" }
          - { label: "Email",           name: "email",       widget: "string" }
          - { label: "Hours",           name: "hours",       widget: "string" }
          - label: "Payment Methods"
            name: "payment_methods"
            widget: "list"
            fields:
              - { label: "Method", name: "method", widget: "string" }
              - { label: "Detail", name: "detail", widget: "string", required: false }
          - label: "Social Links"
            name: "social"
            widget: "list"
            fields:
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "URL",      name: "url",      widget: "string" }
              - { label: "Aria label", name: "aria",   widget: "string" }
